<!DOCTYPE html>

<html lang="vi"><head>

<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Inter', sans-serif;
      }
      .bg-mesh {
        background-color: #f4fbf7;
        background-image: 
          radial-gradient(at 0% 0%, rgba(0, 107, 92, 0.05) 0px, transparent 50%),
          radial-gradient(at 100% 100%, rgba(67, 85, 185, 0.05) 0px, transparent 50%);
      }
      .auth-card-shadow {
        box-shadow: 0 32px 64px -12px rgba(22, 29, 27, 0.06);
      }
    </style>
</head>
<body class="bg-mesh min-h-screen flex flex-col items-center justify-center p-6 antialiased text-on-surface">
<!-- Top Navigation (Hidden on focused auth screens per protocol) -->
<main class="w-full max-w-[440px] flex flex-col items-center">
<!-- Brand Identity -->
<div class="mb-10 text-center">
<h1 class="text-3xl font-black tracking-tighter text-primary mb-3">FreelanceAI</h1>
<p class="text-on-surface-variant body-lg max-w-[320px] mx-auto leading-relaxed">
                Kết nối việc làm Freelance với AI phân tích kỹ năng
            </p>
</div>
<!-- Login Card -->
<div class="w-full bg-surface-container-lowest rounded-lg p-8 auth-card-shadow border border-outline-variant/10">
<!-- Role Selection Tabs -->
<div class="flex p-1 bg-surface-container-low rounded-full mb-8">
<button class="flex-1 py-2.5 text-sm font-bold rounded-full transition-all duration-300 bg-primary text-on-primary shadow-sm">
                    Đăng nhập với Freelancer
                </button>
<button class="flex-1 py-2.5 text-sm font-medium text-on-surface-variant hover:text-primary transition-all duration-300">
                    Đăng nhập với Client
                </button>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant px-1">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface rounded-full border-none ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary outline-none transition-all placeholder:text-outline" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant">Mật khẩu</label>
<a class="text-xs font-bold text-primary hover:text-primary-container transition-colors" href="#">Quên mật khẩu?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface rounded-full border-none ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary outline-none transition-all placeholder:text-outline" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-3 px-1">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="text-sm font-medium text-on-surface-variant cursor-pointer" for="remember">Ghi nhớ đăng nhập</label>
</div>
<!-- Sign In Button -->
<button class="w-full py-4 rounded-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold text-lg shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all duration-300" type="submit">
                    Đăng nhập
                </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-xs uppercase tracking-widest font-bold">
<span class="px-4 bg-surface-container-lowest text-outline">hoặc</span>
</div>
</div>
<!-- Social Login -->
<button class="w-full flex items-center justify-center space-x-3 py-4 rounded-full border border-outline-variant bg-surface-container-lowest hover:bg-surface transition-all duration-300">
<img alt="Google" class="w-5 h-5" data-alt="Google logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBfiPURrbTlvWgIgRutP66Zm-toNaEaN6dFK6jZDk5yPfNdX85srYqJnmvPGTuxMhIpUaV7jidedmWvG27TSIqodEC04my3frOQUgxo9oqE4SsRxxRNA_mW9ch6hjAIMtYQeqwMLPokJht_t94oK5XjCc2OjuIV2sZG2wOa5xFFao8yJEqLVhhWUNJJ8ueFk6EWbpHxryzZELbyszlD5rhqbWx-f6yHddgWElprzRfeIxUoEIfSxcSE-yBqaX2iVWUtYvU-8EkYjYwh"/>
<span class="font-bold text-on-surface">Tiếp tục với Google</span>
</button>
<!-- Registration Link -->
<p class="mt-8 text-center text-sm font-medium text-on-surface-variant">
                Chưa có tài khoản? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Đăng ký</a>
</p>
</div>
<!-- Footer Tagline -->
<div class="mt-12 flex items-center space-x-2 text-outline">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-xs font-bold tracking-widest uppercase opacity-60">Powered by AI Matching – An toàn &amp; Cá nhân hóa</span>
</div>
</main>
<!-- Bottom Decorative Elements -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-primary-container to-secondary opacity-20"></div>
</body></html>
